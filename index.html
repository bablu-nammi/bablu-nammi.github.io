<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bharani Nammi — Deep Learning Researcher</title>
  <meta name="description" content="Bharani Nammi — Deep Learning Engineer & Researcher. Interactive portfolio."/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html,body{width:100%;height:100%;overflow:hidden;background:#03050e;font-family:'Inter',system-ui,sans-serif;}

    /* ── Background ─────────────────────────────────────── */
    #bg{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;}
    .orb{position:absolute;border-radius:50%;filter:blur(120px);opacity:0.09;animation:drift 14s ease-in-out infinite alternate;}
    .orb1{width:800px;height:800px;background:#6366f1;top:-300px;right:-200px;}
    .orb2{width:600px;height:600px;background:#06b6d4;bottom:-200px;left:-200px;animation-delay:-7s;}
    .orb3{width:400px;height:400px;background:#f59e0b;bottom:10%;right:20%;animation-delay:-3s;opacity:0.05;}
    @keyframes drift{from{transform:translate(0,0)}to{transform:translate(50px,30px)}}
    #bg::after{
      content:'';position:absolute;inset:0;
      background-image:linear-gradient(rgba(99,102,241,0.035)1px,transparent 1px),
        linear-gradient(90deg,rgba(99,102,241,0.035)1px,transparent 1px);
      background-size:60px 60px;
    }

    /* ── Tree canvas ────────────────────────────────────── */
    #tree{position:fixed;inset:0;z-index:10;}
    .zoom-canvas{
      position:absolute;inset:0;
      transition:transform 0.8s cubic-bezier(0.4,0,0.2,1);
      will-change:transform;
    }

    /* ── SVG connections ────────────────────────────────── */
    #svg-layer{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;overflow:visible;}
    .edge{fill:none;stroke-width:1.5;stroke-dasharray:7 5;animation:dashflow 3s linear infinite;}
    @keyframes dashflow{to{stroke-dashoffset:-48;}}

    /* ── Nodes ──────────────────────────────────────────── */
    .node{
      position:absolute;transform:translate(-50%,-50%);
      cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:9px;
      transition:filter 0.25s,transform 0.25s;
    }
    .node:hover{transform:translate(-50%,-50%) scale(1.06);}

    .nglow{
      position:absolute;border-radius:50%;opacity:0;
      transition:opacity 0.35s;pointer-events:none;z-index:0;
    }
    .node:hover .nglow{opacity:1;}

    .nring{
      border-radius:50%;display:flex;align-items:center;justify-content:center;
      border:1.5px solid;position:relative;z-index:1;flex-shrink:0;
      transition:box-shadow 0.3s,transform 0.3s,border-color 0.3s;
    }

    /* Root */
    .node-root .nring{
      width:118px;height:118px;
      background:linear-gradient(135deg,rgba(99,102,241,0.2),rgba(99,102,241,0.05));
      border-color:#6366f1;
      box-shadow:0 0 40px rgba(99,102,241,0.2),inset 0 1px 0 rgba(255,255,255,0.04);
    }
    .node-root .nglow{width:200px;height:200px;top:-41px;left:-41px;background:radial-gradient(circle,rgba(99,102,241,0.25),transparent 65%);}
    .node-root:hover .nring{box-shadow:0 0 60px rgba(99,102,241,0.4),inset 0 1px 0 rgba(255,255,255,0.06);}
    .root-init{display:flex;flex-direction:column;align-items:center;gap:4px;}
    .root-av{width:46px;height:46px;border-radius:50%;background:linear-gradient(135deg,#6366f1,#4f46e5);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:900;color:white;letter-spacing:-0.5px;}
    .root-name{font-size:12px;font-weight:800;color:#eef2ff;letter-spacing:-0.3px;white-space:nowrap;}
    .root-title{font-size:8.5px;font-weight:600;color:#818cf8;text-transform:uppercase;letter-spacing:0.9px;white-space:nowrap;}

    /* Category nodes */
    .node-cat .nring{width:72px;height:72px;}
    .node-cat .nglow{width:120px;height:120px;top:-24px;left:-24px;}

    /* Center dot */
    .ndot{
      width:8px;height:8px;border-radius:50%;opacity:0.7;
      transition:opacity 0.2s,transform 0.2s;
    }
    .node:hover .ndot{opacity:1;transform:scale(1.3);}

    .nlabel{
      font-size:11px;font-weight:700;color:#7c88a8;
      text-align:center;line-height:1.35;white-space:nowrap;
      text-transform:uppercase;letter-spacing:0.6px;
      transition:color 0.25s;
    }
    .node:hover .nlabel{color:#c7d2fe;}
    .node.active .nlabel{color:#eef2ff;}
    .node.active .nring{border-width:2px;}

    .nbadge{
      font-size:9px;font-weight:700;padding:2px 8px;border-radius:10px;
      border:1px solid;text-transform:uppercase;letter-spacing:0.4px;
      margin-top:-4px;
    }

    /* Leaf nodes */
    .node-leaf .nring{width:48px;height:48px;}
    .node-leaf .nglow{width:80px;height:80px;top:-16px;left:-16px;}
    .node-leaf .ndot{width:6px;height:6px;}
    .node-leaf .nlabel{font-size:9.5px;max-width:72px;white-space:normal;text-align:center;letter-spacing:0.3px;}

    /* ── Zoom backdrop ──────────────────────────────────── */
    #zoom-backdrop{
      position:fixed;inset:0;z-index:40;
      background:rgba(2,4,14,0.72);
      opacity:0;pointer-events:none;
      transition:opacity 0.5s;
      backdrop-filter:blur(3px);
    }
    body.zoomed-in #zoom-backdrop{opacity:1;pointer-events:auto;}

    /* ── Content card ───────────────────────────────────── */
    #content-card{
      position:fixed;
      top:50%;left:50%;
      transform:translate(-50%,-50%) scale(0.96);
      opacity:0;pointer-events:none;
      width:88vw;
      height:88vh;
      background:rgba(3,5,15,0.98);
      border:1px solid rgba(255,255,255,0.07);
      border-radius:20px;
      z-index:51;
      transition:opacity 0.4s 0.1s, transform 0.4s 0.1s;
      display:flex;flex-direction:column;
      overflow:hidden;
      box-shadow:0 40px 120px rgba(0,0,0,0.8),0 0 0 1px rgba(99,102,241,0.1);
    }
    body.zoomed-in #content-card{
      opacity:1;pointer-events:auto;
      transform:translate(-50%,-50%) scale(1);
    }

    .card-topbar{
      display:flex;align-items:center;gap:16px;
      padding:16px 28px;
      border-bottom:1px solid rgba(255,255,255,0.05);
      flex-shrink:0;
      background:rgba(255,255,255,0.015);
    }
    .back-btn{
      background:rgba(99,102,241,0.1);border:1px solid rgba(99,102,241,0.22);
      color:#818cf8;padding:6px 14px;border-radius:8px;cursor:pointer;
      font-family:inherit;font-size:12px;font-weight:700;
      display:flex;align-items:center;gap:6px;transition:all 0.2s;
      flex-shrink:0;
    }
    .back-btn:hover{background:rgba(99,102,241,0.2);color:#c7d2fe;}
    .card-title-wrap{flex:1;}
    .card-title{font-size:20px;font-weight:800;color:#eef2ff;letter-spacing:-0.5px;}
    .card-sub{font-size:12.5px;font-weight:500;margin-top:2px;}

    .card-body{
      flex:1;overflow-y:auto;padding:32px 36px;
      scrollbar-width:thin;scrollbar-color:#1a2236 transparent;
    }
    .card-body::-webkit-scrollbar{width:5px;}
    .card-body::-webkit-scrollbar-thumb{background:#1a2236;border-radius:3px;}

    /* Two-column grid for papers and awards on wide card */
    .two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
    @media(max-width:800px){.two-col{grid-template-columns:1fr;}}

    /* ── About ──────────────────────────────────────────── */
    .about-layout{display:grid;grid-template-columns:1fr 1fr;gap:40px;align-items:start;}
    @media(max-width:700px){.about-layout{grid-template-columns:1fr;}}
    .about-left{}
    .about-hero{display:flex;gap:22px;align-items:flex-start;margin-bottom:24px;}
    .about-avatar{width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,#6366f1,#4f46e5);display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:900;color:white;flex-shrink:0;}
    .about-name{font-size:26px;font-weight:900;letter-spacing:-1px;color:#eef2ff;margin-bottom:5px;}
    .about-role{font-size:13.5px;color:#818cf8;font-weight:600;margin-bottom:10px;}
    .about-locs{display:flex;gap:7px;flex-wrap:wrap;}
    .loc-chip{background:#0c1020;border:1px solid #161e30;color:#7c88a8;font-size:11px;font-weight:600;padding:3px 10px;border-radius:6px;}
    .about-bio{font-size:14px;color:#7c88a8;line-height:1.85;margin-bottom:0;}
    .about-right{}
    .about-stats{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:22px;}
    .ast{background:#0c1020;border:1px solid #161e30;border-radius:12px;padding:18px;text-align:center;}
    .ast-v{font-family:'JetBrains Mono',monospace;font-size:24px;font-weight:700;color:#eef2ff;}
    .ast-l{font-size:10px;color:#3d4a6a;text-transform:uppercase;letter-spacing:0.8px;margin-top:4px;}
    .about-links{display:flex;gap:9px;flex-wrap:wrap;}
    .alink{display:flex;align-items:center;gap:7px;background:#0c1020;border:1px solid #1e2840;color:#7c88a8;text-decoration:none;padding:10px 16px;border-radius:9px;font-size:13px;font-weight:600;transition:all 0.2s;}
    .alink:hover{border-color:#6366f1;color:#eef2ff;}

    /* ── Papers ─────────────────────────────────────────── */
    .papers-grid{display:flex;flex-direction:column;gap:13px;}
    .paper-card{background:#0c1020;border:1px solid #161e30;border-radius:12px;padding:18px;transition:border-color 0.2s;}
    .paper-card:hover{border-color:#243048;}
    .paper-title{font-size:13.5px;font-weight:700;color:#eef2ff;line-height:1.4;margin-bottom:5px;}
    .paper-authors{font-size:11.5px;color:#818cf8;margin-bottom:3px;font-weight:500;}
    .paper-venue{font-size:11px;color:#3d4a6a;font-style:italic;margin-bottom:9px;}
    .paper-abstract{font-size:11.5px;color:#7c88a8;line-height:1.65;margin-bottom:10px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;}
    .paper-footer{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:7px;}
    .paper-tags{display:flex;gap:5px;flex-wrap:wrap;}
    .ptag{background:rgba(6,182,212,0.07);border:1px solid rgba(6,182,212,0.2);color:#06b6d4;font-size:10px;font-weight:600;padding:2px 7px;border-radius:4px;}
    .paper-year{font-family:'JetBrains Mono',monospace;font-size:10.5px;color:#3d4a6a;background:#070a16;border:1px solid #161e30;padding:2px 7px;border-radius:5px;}
    .paper-link{font-size:12px;color:#818cf8;text-decoration:none;font-weight:600;display:flex;align-items:center;gap:4px;}
    .paper-link:hover{color:#c7d2fe;}
    .papers-drop{background:#070a16;border:2px dashed rgba(99,102,241,0.2);border-radius:12px;padding:36px 22px;text-align:center;}
    .papers-drop strong{display:block;font-size:14px;color:#94a3b8;margin-bottom:6px;}
    .papers-drop span{font-size:12px;color:#3d4a6a;line-height:1.7;display:block;}

    /* ── Awards ─────────────────────────────────────────── */
    .awards-grid{display:flex;flex-direction:column;gap:13px;}
    .award-card{background:#0c1020;border:1px solid #161e30;border-radius:12px;padding:18px;position:relative;overflow:hidden;transition:all 0.2s;}
    .award-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--ac,linear-gradient(90deg,#f59e0b,#fbbf24));}
    .award-card.win{border-color:rgba(245,158,11,0.25);background:rgba(245,158,11,0.025);}
    .award-card:hover{transform:translateY(-2px);}
    .award-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:9px;}
    .award-title-wrap{}
    .award-event{font-size:14px;font-weight:700;color:#eef2ff;margin-bottom:3px;}
    .award-project{font-size:12px;color:#f59e0b;font-weight:600;margin-bottom:6px;}
    .award-badge{font-size:9.5px;font-weight:700;padding:3px 10px;border-radius:20px;border:1px solid;text-transform:uppercase;letter-spacing:0.4px;flex-shrink:0;margin-top:2px;}
    .badge-gold{border-color:rgba(245,158,11,0.45);color:#f59e0b;background:rgba(245,158,11,0.1);}
    .badge-part{border-color:#1e2840;color:#3d4a6a;background:transparent;}
    .badge-papers{border-color:rgba(6,182,212,0.45);color:#06b6d4;background:rgba(6,182,212,0.1);}
    .award-desc{font-size:12px;color:#7c88a8;line-height:1.6;}
    .award-year{font-family:'JetBrains Mono',monospace;font-size:10.5px;color:#3d4a6a;margin-top:8px;}

    /* ── Experience ──────────────────────────────────────── */
    .exp-timeline{display:flex;flex-direction:column;gap:13px;}
    .exp-card{background:#0c1020;border:1px solid #161e30;border-radius:12px;padding:18px;transition:border-color 0.2s;}
    .exp-card:hover{border-color:#243048;}
    .exp-top{display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:5px;}
    .exp-role{font-size:14px;font-weight:700;color:#eef2ff;}
    .exp-co{font-size:12px;color:#818cf8;font-weight:600;margin-top:2px;}
    .exp-period{font-family:'JetBrains Mono',monospace;font-size:10.5px;color:#3d4a6a;background:#070a16;border:1px solid #161e30;padding:3px 9px;border-radius:5px;align-self:flex-start;white-space:nowrap;}
    .exp-desc{font-size:12px;color:#7c88a8;line-height:1.7;margin-top:8px;}
    .exp-stack{display:flex;flex-wrap:wrap;gap:5px;margin-top:10px;}
    .etag{background:rgba(99,102,241,0.07);border:1px solid rgba(99,102,241,0.16);color:#818cf8;font-size:10px;font-weight:600;padding:2px 8px;border-radius:4px;}

    /* ── Education ───────────────────────────────────────── */
    .edu-list{display:flex;flex-direction:column;gap:13px;}
    .edu-card{background:#0c1020;border:1px solid #161e30;border-radius:12px;padding:20px;position:relative;overflow:hidden;}
    .edu-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,#6366f1,#06b6d4);}
    .edu-school{font-size:15px;font-weight:800;color:#eef2ff;margin-bottom:4px;}
    .edu-deg{font-size:13px;color:#818cf8;font-weight:600;margin-bottom:3px;}
    .edu-year{font-family:'JetBrains Mono',monospace;font-size:11px;color:#3d4a6a;margin-bottom:12px;}
    .edu-tags{display:flex;flex-wrap:wrap;gap:6px;}
    .eutag{background:#070a16;border:1px solid #161e30;color:#7c88a8;font-size:11px;padding:3px 9px;border-radius:5px;}

    /* ── Hint ────────────────────────────────────────────── */
    #hint{
      position:fixed;bottom:22px;left:50%;transform:translateX(-50%);
      background:rgba(12,16,32,0.88);border:1px solid rgba(255,255,255,0.05);
      color:#3d4a6a;font-size:12px;font-weight:500;
      padding:7px 18px;border-radius:20px;
      pointer-events:none;z-index:100;
      transition:opacity 0.4s;backdrop-filter:blur(8px);
    }
    #hint.hide{opacity:0;}

    /* ── Sig ─────────────────────────────────────────────── */
    #sig{
      position:fixed;top:18px;left:24px;z-index:200;
      font-size:14px;font-weight:900;color:#eef2ff;letter-spacing:-0.5px;
      pointer-events:none;
    }
    #sig em{color:#818cf8;font-style:normal;}

    /* ── Active node pulse ring ──────────────────────────── */
    @keyframes ringpulse{
      0%{box-shadow:0 0 0 0 var(--np,rgba(99,102,241,0.5));}
      70%{box-shadow:0 0 0 12px transparent;}
      100%{box-shadow:0 0 0 0 transparent;}
    }
    .node.active .nring{animation:ringpulse 1.8s ease-out infinite;}

    /* ── Paper detail view ───────────────────────────────── */
    .paper-detail{display:grid;grid-template-columns:1fr 340px;gap:28px;align-items:start;}
    @media(max-width:760px){.paper-detail{grid-template-columns:1fr;}}
    .paper-detail-left{}
    .paper-detail-right{display:flex;flex-direction:column;gap:14px;}

    .pd-venue-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:18px;}
    .pd-venue{font-size:12px;font-weight:700;color:#06b6d4;text-transform:uppercase;letter-spacing:0.6px;}
    .pd-dot{color:#1e2840;}
    .pd-year{font-family:'JetBrains Mono',monospace;font-size:11.5px;color:#3d4a6a;}

    .pd-title{font-size:18px;font-weight:800;color:#eef2ff;line-height:1.45;margin-bottom:14px;letter-spacing:-0.3px;}
    .pd-authors{font-size:12.5px;color:#818cf8;font-weight:500;line-height:1.7;margin-bottom:20px;}

    .pd-section-label{font-size:10px;font-weight:700;color:#3d4a6a;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;}
    .pd-abstract{font-size:13.5px;color:#94a3b8;line-height:1.85;margin-bottom:24px;}

    .pd-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:24px;}

    .pd-read-btn{
      display:inline-flex;align-items:center;gap:9px;
      background:linear-gradient(135deg,rgba(6,182,212,0.15),rgba(6,182,212,0.06));
      border:1px solid rgba(6,182,212,0.35);
      color:#06b6d4;text-decoration:none;
      padding:13px 20px;border-radius:11px;
      font-family:inherit;font-size:13px;font-weight:700;
      transition:all 0.2s;width:100%;justify-content:center;
    }
    .pd-read-btn:hover{background:rgba(6,182,212,0.22);border-color:rgba(6,182,212,0.55);color:#67e8f9;}

    .pd-stat-box{background:#070a16;border:1px solid #161e30;border-radius:12px;padding:18px;}
    .pd-stat-label{font-size:10px;font-weight:700;color:#3d4a6a;text-transform:uppercase;letter-spacing:0.8px;margin-bottom:12px;}
    .pd-stat-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #0d1220;}
    .pd-stat-row:last-child{border-bottom:none;}
    .pd-stat-key{font-size:11.5px;color:#7c88a8;}
    .pd-stat-val{font-family:'JetBrains Mono',monospace;font-size:11.5px;color:#eef2ff;font-weight:600;}

    .pd-highlight{background:rgba(99,102,241,0.07);border:1px solid rgba(99,102,241,0.18);border-radius:10px;padding:14px;}
    .pd-highlight-label{font-size:10px;font-weight:700;color:#818cf8;text-transform:uppercase;letter-spacing:0.8px;margin-bottom:8px;}
    .pd-highlight-text{font-size:12.5px;color:#94a3b8;line-height:1.7;}
  </style>
</head>
<body>

<div id="bg">
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>
</div>

<div id="sig">BN<em>.</em></div>

<div id="tree">
  <div class="zoom-canvas" id="zc">
    <svg id="svg-layer"></svg>
    <div id="nodes-wrap"></div>
  </div>
</div>

<div id="zoom-backdrop"></div>

<div id="content-card">
  <div class="card-topbar">
    <button class="back-btn" id="backBtn">
      <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      Back
    </button>
    <div class="card-title-wrap">
      <div class="card-title" id="cTitle"></div>
      <div class="card-sub"  id="cSub"></div>
    </div>
  </div>
  <div class="card-body" id="cBody"></div>
</div>

<div id="hint">✦ Click a node to explore</div>

<script>
// ── Node definitions ─────────────────────────────────────────────────────
const NODES = {
  root:{
    type:'root', label:'Bharani Nammi',
    x:50, y:50,
    color:'#6366f1', glow:'rgba(99,102,241,0.5)',
    children:['papers','awards','exp','edu'],
  },
  papers:{
    type:'cat', label:'Research\nPapers',
    x:26, y:20, color:'#06b6d4', glow:'rgba(6,182,212,0.4)',
    badge:'3 Papers', badgeClass:'badge-papers',
    children:['p1','p2','p3'],
  },
  awards:{
    type:'cat', label:'Awards\n& Wins',
    x:74, y:20, color:'#f59e0b', glow:'rgba(245,158,11,0.4)',
    badge:'2× Winner', badgeClass:'badge-gold',
    children:['a1','a2'],
  },
  exp:{
    type:'cat', label:'Experience',
    x:78, y:72, color:'#8b5cf6', glow:'rgba(139,92,246,0.4)',
    badge:null, badgeClass:'',
    children:[],
  },
  edu:{
    type:'cat', label:'Education',
    x:22, y:72, color:'#10b981', glow:'rgba(16,185,129,0.4)',
    badge:null, badgeClass:'',
    children:[],
  },
  p1:{ type:'leaf', label:'CRISPR\nClassifier', x:10, y:9,  color:'#67e8f9', glow:'rgba(103,232,249,0.3)', parent:'papers' },

// ── Render tree ──────────────────────────────────────────────────────────
const tree = document.getElementById('tree');
const zc   = document.getElementById('zc');
const svg  = document.getElementById('svg-layer');
const wrap = document.getElementById('nodes-wrap');

function vw(){ return window.innerWidth; }
function vh(){ return window.innerHeight; }
function px(pct, dim){ return pct / 100 * dim; }

function renderTree(){
  const W = vw(), H = vh();
  svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
  svg.innerHTML = '';

  // Edges
  for(const [a, b, color] of EDGES){
    const na = NODES[a], nb = NODES[b];
    if(!na||!nb) continue;
    const x1=px(na.x,W), y1=px(na.y,H);
    const x2=px(nb.x,W), y2=px(nb.y,H);
    const mx=(x1+x2)/2, my=(y1+y2)/2;
    const dx=x2-x1, dy=y2-y1;
    const cx=mx-dy*0.1, cy=my+dx*0.1;
    const path=document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('d',`M${x1},${y1} Q${cx},${cy} ${x2},${y2}`);
    path.setAttribute('class','edge');
    path.setAttribute('stroke', color+'44');
    svg.appendChild(path);
  }

  // Nodes
  wrap.innerHTML='';
  for(const [key, n] of Object.entries(NODES)){
    const el = document.createElement('div');
    const x  = px(n.x, W), y = px(n.y, H);
    el.id = `node-${key}`;
    el.style.left = x+'px';
    el.style.top  = y+'px';

    if(n.type==='root'){
      el.className = 'node node-root';
      el.innerHTML = `
        <div class="nglow" style="width:200px;height:200px;top:-41px;left:-41px;background:radial-gradient(circle,${n.glow},transparent 65%)"></div>
        <div class="nring" style="--np:${n.glow};background:linear-gradient(135deg,rgba(99,102,241,0.2),rgba(99,102,241,0.05));border-color:${n.color};box-shadow:0 0 36px rgba(99,102,241,0.18)">
          <div class="root-init">
            <div class="root-av">BN</div>
            <div class="root-name">Bharani Nammi</div>
            <div class="root-title">Deep Learning</div>
          </div>
        </div>`;
    } else if(n.type==='cat'){
      el.className = 'node node-cat';
      el.innerHTML = `
        <div class="nglow" style="width:120px;height:120px;top:-24px;left:-24px;background:radial-gradient(circle,${n.glow},transparent 65%)"></div>
        <div class="nring" style="--np:${n.glow};background:${n.color}12;border-color:${n.color}50;box-shadow:0 0 20px ${n.color}18">
          <div class="ndot" style="background:${n.color}"></div>
        </div>
        <div class="nlabel">${n.label.replace('\n','<br>')}</div>
        ${n.badge?`<span class="nbadge ${n.badgeClass}" style="border-color:${n.color}55;color:${n.color}">${n.badge}</span>`:''}`;
    } else {
      el.className = 'node node-leaf';
      el.innerHTML = `
        <div class="nglow" style="width:80px;height:80px;top:-16px;left:-16px;background:radial-gradient(circle,${n.glow},transparent 65%)"></div>
        <div class="nring" style="--np:${n.glow};background:${n.color}10;border-color:${n.color}40;box-shadow:0 0 10px ${n.color}10">
          <div class="ndot" style="background:${n.color}"></div>
        </div>
        <div class="nlabel">${n.label.replace('\n','<br>')}</div>`;
    }

    el.addEventListener('click', e => { e.stopPropagation(); openCard(key, key); });
    wrap.appendChild(el);
  }
}

// ── Card open / close ────────────────────────────────────────────────────
let activeKey = null;

function openCard(key, clickedKey){
  const c = CONTENT[key];
  if(!c) return;

  // Highlight node
  document.querySelectorAll('.node').forEach(n=>n.classList.remove('active'));
  document.getElementById(`node-${clickedKey}`)?.classList.add('active');
  document.getElementById(`node-${key}`)?.classList.add('active');

  // Zoom canvas toward clicked node
  const n = NODES[clickedKey] || NODES[key];
  const W = vw(), H = vh();
  const nx = px(n.x, W), ny = px(n.y, H);
  const scale = n.type==='root' ? 1.6 : 2.8;
  zc.style.transformOrigin = `${nx}px ${ny}px`;
  zc.style.transform = `scale(${scale})`;

  // Fill card
  document.getElementById('cTitle').textContent = c.title;
  document.getElementById('cSub').textContent   = c.sub;
  document.getElementById('cSub').style.color   = c.subColor || '#7c88a8';

  const body = document.getElementById('cBody');
  body.innerHTML = c.html;

  body.className = 'card-body';

  document.getElementById('hint').classList.add('hide');
  document.body.classList.add('zoomed-in');
  activeKey = key;
}

function closeCard(){
  document.body.classList.remove('zoomed-in');
  document.getElementById('cBody').className = 'card-body';
  // small delay so backdrop fades first, then reset zoom
  setTimeout(()=>{
    zc.style.transform = 'scale(1)';
    zc.style.transformOrigin = '50% 50%';
  }, 120);
  document.querySelectorAll('.node').forEach(n=>n.classList.remove('active'));
  document.getElementById('hint').classList.remove('hide');
  activeKey = null;
}

document.getElementById('backBtn').addEventListener('click', closeCard);
document.getElementById('zoom-backdrop').addEventListener('click', closeCard);
document.getElementById('content-card').addEventListener('click', e=>e.stopPropagation());
document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeCard(); });
window.addEventListener('resize', renderTree);

renderTree();
</script>
