<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bharani Nammi — Deep Learning Researcher</title>
  <meta name="description" content="Bharani Nammi — Deep Learning Engineer & Researcher. Interactive portfolio."/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html,body{width:100%;height:100%;overflow:hidden;background:#03050e;font-family:'Inter',system-ui,sans-serif;}

    /* ── Background ────────────────────────────────────── */
    #bg {
      position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;
    }
    .orb {
      position:absolute;border-radius:50%;filter:blur(120px);opacity:0.1;
      animation:drift 14s ease-in-out infinite alternate;
    }
    .orb1{width:800px;height:800px;background:#6366f1;top:-300px;right:-200px;}
    .orb2{width:600px;height:600px;background:#06b6d4;bottom:-200px;left:-200px;animation-delay:-7s;}
    .orb3{width:400px;height:400px;background:#f59e0b;bottom:10%;right:20%;animation-delay:-3s;opacity:0.06;}
    @keyframes drift{from{transform:translate(0,0)}to{transform:translate(50px,30px)}}

    /* Grid */
    #bg::after{
      content:'';position:absolute;inset:0;
      background-image:linear-gradient(rgba(99,102,241,0.04)1px,transparent 1px),
        linear-gradient(90deg,rgba(99,102,241,0.04)1px,transparent 1px);
      background-size:60px 60px;
    }

    /* ── Tree canvas ───────────────────────────────────── */
    #tree {
      position:fixed;inset:0;z-index:10;
      transition:transform 0.7s cubic-bezier(0.4,0,0.2,1),
                 left 0.7s cubic-bezier(0.4,0,0.2,1),
                 width 0.7s cubic-bezier(0.4,0,0.2,1);
    }
    /* When panel is open: shrink tree to left 42% */
    body.panel-open #tree {
      width:42%;
    }
    body.panel-open #tree .zoom-canvas {
      transform:scale(1.0) !important;
    }

    .zoom-canvas {
      position:absolute;inset:0;
      transition:transform 0.7s cubic-bezier(0.4,0,0.2,1);
    }

    /* ── SVG connections ───────────────────────────────── */
    #svg-layer {
      position:absolute;inset:0;width:100%;height:100%;
      pointer-events:none;overflow:visible;
    }
    .edge {
      fill:none;
      stroke-width:1.5;
      stroke-dasharray:8 5;
      animation:dashflow 2.5s linear infinite;
    }
    .edge.glow {
      stroke-dasharray:none;
      filter:drop-shadow(0 0 4px currentColor);
    }
    @keyframes dashflow{to{stroke-dashoffset:-52;}}

    /* ── Nodes ─────────────────────────────────────────── */
    .node {
      position:absolute;
      transform:translate(-50%,-50%);
      cursor:pointer;
      display:flex;flex-direction:column;align-items:center;gap:10px;
      transition:filter 0.2s;
    }
    .node:hover .nring{transform:scale(1.1);}
    .node:hover .nglow{opacity:1;}

    .nglow {
      position:absolute;border-radius:50%;opacity:0;
      transition:opacity 0.3s;pointer-events:none;
      z-index:0;
    }
    .nring {
      border-radius:50%;
      display:flex;align-items:center;justify-content:center;
      border:2px solid;
      transition:transform 0.3s,box-shadow 0.3s;
      position:relative;z-index:1;
      flex-shrink:0;
    }
    .node.active .nring {
      border-width:3px;
    }

    /* Root node */
    .node-root .nring{
      width:110px;height:110px;
      background:linear-gradient(135deg,rgba(99,102,241,0.25),rgba(99,102,241,0.08));
      border-color:#6366f1;
      box-shadow:0 0 32px rgba(99,102,241,0.25),inset 0 1px 0 rgba(255,255,255,0.05);
    }
    .node-root .nglow{width:180px;height:180px;top:-35px;left:-35px;background:radial-gradient(circle,rgba(99,102,241,0.3),transparent 65%);}
    .node-root:hover .nring{box-shadow:0 0 50px rgba(99,102,241,0.45);}
    .root-init{display:flex;flex-direction:column;align-items:center;gap:3px;}
    .root-av{width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,#6366f1,#4f46e5);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;color:white;letter-spacing:-1px;}
    .root-name{font-size:13px;font-weight:800;color:#eef2ff;letter-spacing:-0.3px;white-space:nowrap;}
    .root-title{font-size:9px;font-weight:600;color:#818cf8;text-transform:uppercase;letter-spacing:1px;white-space:nowrap;}

    /* Category nodes (tier 1) */
    .node-cat .nring{width:70px;height:70px;}
    .node-cat .nglow{width:110px;height:110px;top:-20px;left:-20px;}
    .nicon{font-size:22px;line-height:1;}
    .nlabel{
      font-size:11px;font-weight:700;color:#94a3b8;
      text-align:center;line-height:1.3;white-space:nowrap;
      text-transform:uppercase;letter-spacing:0.5px;
    }
    .node.active .nlabel{color:#eef2ff;}
    .nbadge{
      font-size:9px;font-weight:700;padding:2px 7px;border-radius:10px;
      border:1px solid;text-transform:uppercase;letter-spacing:0.5px;
      margin-top:-5px;
    }

    /* Leaf nodes (tier 2) */
    .node-leaf .nring{width:50px;height:50px;}
    .node-leaf .nglow{width:80px;height:80px;top:-15px;left:-15px;}
    .node-leaf .nicon{font-size:16px;}
    .node-leaf .nlabel{font-size:10px;max-width:80px;white-space:normal;text-align:center;}

    /* ── Panel ─────────────────────────────────────────── */
    #panel {
      position:fixed;top:0;right:0;bottom:0;width:58%;z-index:50;
      background:rgba(4,6,18,0.97);
      border-left:1px solid #1a2236;
      transform:translateX(100%);
      transition:transform 0.65s cubic-bezier(0.4,0,0.2,1);
      display:flex;flex-direction:column;
      backdrop-filter:blur(20px);
    }
    body.panel-open #panel{transform:translateX(0);}

    .panel-topbar {
      display:flex;align-items:center;gap:12px;padding:20px 28px;
      border-bottom:1px solid #1a2236;flex-shrink:0;
    }
    .back-btn {
      background:rgba(99,102,241,0.1);border:1px solid rgba(99,102,241,0.25);
      color:#818cf8;padding:7px 14px;border-radius:8px;cursor:pointer;
      font-family:inherit;font-size:12px;font-weight:700;
      display:flex;align-items:center;gap:6px;transition:all 0.2s;
    }
    .back-btn:hover{background:rgba(99,102,241,0.2);color:#c7d2fe;}
    .panel-node-icon{font-size:24px;}
    .panel-node-name{font-size:18px;font-weight:800;color:#eef2ff;letter-spacing:-0.5px;}
    .panel-node-sub{font-size:12px;font-weight:600;margin-top:1px;}

    .panel-body{flex:1;overflow-y:auto;padding:28px;scrollbar-width:thin;scrollbar-color:#1e2840 transparent;}
    .panel-body::-webkit-scrollbar{width:4px;}
    .panel-body::-webkit-scrollbar-thumb{background:#1e2840;border-radius:2px;}

    /* ── Panel content components ──────────────────────── */
    /* About */
    .about-hero{display:flex;gap:24px;align-items:flex-start;margin-bottom:28px;}
    .about-avatar{width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,#6366f1,#4f46e5);display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:900;color:white;flex-shrink:0;}
    .about-meta{}
    .about-name{font-size:22px;font-weight:900;letter-spacing:-1px;color:#eef2ff;margin-bottom:3px;}
    .about-role{font-size:13px;color:#818cf8;font-weight:600;margin-bottom:8px;}
    .about-locs{display:flex;gap:8px;flex-wrap:wrap;}
    .loc-chip{background:#0c1020;border:1px solid #161e30;color:#7c88a8;font-size:11px;font-weight:600;padding:3px 10px;border-radius:6px;}
    .about-bio{font-size:14px;color:#7c88a8;line-height:1.8;margin-bottom:24px;}
    .about-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px;}
    .ast{background:#0c1020;border:1px solid #161e30;border-radius:10px;padding:14px;text-align:center;}
    .ast-v{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:700;color:#eef2ff;}
    .ast-l{font-size:10px;color:#3d4a6a;text-transform:uppercase;letter-spacing:0.8px;margin-top:3px;}
    .about-links{display:flex;gap:10px;flex-wrap:wrap;}
    .alink{display:flex;align-items:center;gap:7px;background:#0c1020;border:1px solid #1e2840;color:#7c88a8;text-decoration:none;padding:10px 16px;border-radius:9px;font-size:13px;font-weight:600;transition:all 0.2s;}
    .alink:hover{border-color:#6366f1;color:#eef2ff;}

    /* Papers */
    .papers-grid{display:flex;flex-direction:column;gap:14px;}
    .paper-card{background:#0c1020;border:1px solid #161e30;border-radius:12px;padding:20px;transition:border-color 0.2s;}
    .paper-card:hover{border-color:#1e2840;}
    .paper-title{font-size:14px;font-weight:700;color:#eef2ff;line-height:1.4;margin-bottom:6px;}
    .paper-authors{font-size:12px;color:#818cf8;margin-bottom:3px;font-weight:500;}
    .paper-venue{font-size:11px;color:#3d4a6a;font-style:italic;margin-bottom:10px;}
    .paper-abstract{font-size:12px;color:#7c88a8;line-height:1.65;margin-bottom:10px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;}
    .paper-footer{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
    .paper-tags{display:flex;gap:5px;flex-wrap:wrap;}
    .ptag{background:rgba(6,182,212,0.08);border:1px solid rgba(6,182,212,0.2);color:#06b6d4;font-size:10px;font-weight:600;padding:2px 8px;border-radius:4px;}
    .paper-year{font-family:'JetBrains Mono',monospace;font-size:11px;color:#3d4a6a;background:#070a16;border:1px solid #161e30;padding:3px 8px;border-radius:5px;}
    .paper-link{font-size:12px;color:#818cf8;text-decoration:none;font-weight:600;display:flex;align-items:center;gap:4px;}
    .paper-link:hover{color:#c7d2fe;}
    .papers-drop{background:#070a16;border:2px dashed #1e2840;border-radius:12px;padding:40px 24px;text-align:center;}
    .papers-drop strong{display:block;font-size:14px;color:#94a3b8;margin-bottom:6px;}
    .papers-drop span{font-size:12px;color:#3d4a6a;}

    /* Awards */
    .awards-grid{display:flex;flex-direction:column;gap:14px;}
    .award-card{background:#0c1020;border:1px solid #161e30;border-radius:12px;padding:20px;position:relative;overflow:hidden;transition:all 0.2s;}
    .award-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--ac,linear-gradient(90deg,#f59e0b,#fbbf24));}
    .award-card.win{border-color:rgba(245,158,11,0.3);background:rgba(245,158,11,0.03);}
    .award-card:hover{transform:translateY(-2px);}
    .award-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
    .award-trophy{font-size:28px;}
    .award-badge{font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;border:1px solid;text-transform:uppercase;letter-spacing:0.5px;}
    .badge-gold{border-color:rgba(245,158,11,0.5);color:#f59e0b;background:rgba(245,158,11,0.1);}
    .badge-part{border-color:#1e2840;color:#3d4a6a;background:transparent;}
    .award-event{font-size:14px;font-weight:700;color:#eef2ff;margin-bottom:3px;}
    .award-project{font-size:12px;color:#818cf8;font-weight:600;margin-bottom:6px;}
    .award-desc{font-size:12px;color:#7c88a8;line-height:1.6;}
    .award-year{font-family:'JetBrains Mono',monospace;font-size:11px;color:#3d4a6a;margin-top:8px;}

    /* Experience */
    .exp-timeline{display:flex;flex-direction:column;gap:14px;}
    .exp-card{background:#0c1020;border:1px solid #161e30;border-radius:12px;padding:20px;transition:border-color 0.2s;}
    .exp-card:hover{border-color:#1e2840;}
    .exp-top{display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:6px;}
    .exp-role{font-size:14px;font-weight:700;color:#eef2ff;}
    .exp-co{font-size:12px;color:#818cf8;font-weight:600;margin-top:2px;}
    .exp-period{font-family:'JetBrains Mono',monospace;font-size:11px;color:#3d4a6a;background:#070a16;border:1px solid #161e30;padding:3px 9px;border-radius:5px;align-self:flex-start;white-space:nowrap;}
    .exp-desc{font-size:12px;color:#7c88a8;line-height:1.7;margin-top:8px;}
    .exp-stack{display:flex;flex-wrap:wrap;gap:5px;margin-top:10px;}
    .etag{background:rgba(99,102,241,0.08);border:1px solid rgba(99,102,241,0.18);color:#818cf8;font-size:10px;font-weight:600;padding:2px 8px;border-radius:4px;}

    /* Education */
    .edu-list{display:flex;flex-direction:column;gap:14px;}
    .edu-card{background:#0c1020;border:1px solid #161e30;border-radius:12px;padding:22px;position:relative;overflow:hidden;}
    .edu-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,#6366f1,#06b6d4);}
    .edu-school{font-size:15px;font-weight:800;color:#eef2ff;margin-bottom:4px;}
    .edu-deg{font-size:13px;color:#818cf8;font-weight:600;margin-bottom:3px;}
    .edu-year{font-family:'JetBrains Mono',monospace;font-size:11px;color:#3d4a6a;margin-bottom:12px;}
    .edu-tags{display:flex;flex-wrap:wrap;gap:6px;}
    .eutag{background:#070a16;border:1px solid #161e30;color:#7c88a8;font-size:11px;padding:3px 9px;border-radius:5px;}

    /* ── Hint overlay ──────────────────────────────────── */
    #hint {
      position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
      background:rgba(12,16,32,0.9);border:1px solid #161e30;
      color:#3d4a6a;font-size:12px;font-weight:500;
      padding:8px 18px;border-radius:20px;
      pointer-events:none;z-index:100;
      transition:opacity 0.4s;backdrop-filter:blur(8px);
    }
    #hint.hide{opacity:0;}

    /* ── Top-left signature ────────────────────────────── */
    #sig {
      position:fixed;top:18px;left:24px;z-index:200;
      font-size:14px;font-weight:900;color:#eef2ff;letter-spacing:-0.5px;
      pointer-events:none;
    }
    #sig em{color:#818cf8;font-style:normal;}
  </style>
</head>

// ── Render ───────────────────────────────────────────────────────────────
const tree = document.getElementById('tree');
const zc   = document.getElementById('zc');
const svg  = document.getElementById('svg-layer');
const wrap = document.getElementById('nodes-wrap');

function vw(){ return tree.clientWidth || window.innerWidth; }
function vh(){ return window.innerHeight; }
function px(pct, dim){ return pct / 100 * dim; }

function renderTree(){
  const W = vw(), H = vh();
  svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
  svg.innerHTML = '';

  // Draw edges
  for(const [a, b, color] of EDGES){
    const na = NODES[a], nb = NODES[b];
    if(!na||!nb) continue;
    const x1=px(na.x,W), y1=px(na.y,H);
    const x2=px(nb.x,W), y2=px(nb.y,H);
    const mx=(x1+x2)/2, my=(y1+y2)/2;
    const dx=x2-x1, dy=y2-y1;
    const cx=mx-dy*0.12, cy=my+dx*0.12;
    const path=document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('d',`M${x1},${y1} Q${cx},${cy} ${x2},${y2}`);
    path.setAttribute('class','edge');
    path.setAttribute('stroke', color+'55');
    svg.appendChild(path);
  }

  // Draw nodes
  wrap.innerHTML='';
  for(const [key, n] of Object.entries(NODES)){
    const el=document.createElement('div');
    const x=px(n.x,W), y=px(n.y,H);

    if(n.type==='root'){
      el.className='node node-root';
      el.id=`node-${key}`;
      el.style.left=x+'px'; el.style.top=y+'px';
      el.innerHTML=`
        <div class="nglow" style="width:180px;height:180px;top:-35px;left:-35px;background:radial-gradient(circle,${n.glow},transparent 65%)"></div>
        <div class="nring" style="background:linear-gradient(135deg,rgba(99,102,241,0.22),rgba(99,102,241,0.06));border-color:${n.color};box-shadow:0 0 32px rgba(99,102,241,0.2)">
          <div class="root-init">
            <div class="root-av">BN</div>
            <div class="root-name">Bharani Nammi</div>
            <div class="root-title">Deep Learning</div>
          </div>
        </div>`;
    } else if(n.type==='cat'){
      el.className='node node-cat';
      el.id=`node-${key}`;
      el.style.left=x+'px'; el.style.top=y+'px';
      el.innerHTML=`
        <div class="nglow" style="width:110px;height:110px;top:-20px;left:-20px;background:radial-gradient(circle,${n.glow},transparent 65%)"></div>
        <div class="nring" style="background:${n.color}18;border-color:${n.color}55;box-shadow:0 0 18px ${n.glow.replace('0.45','0.12')}">
          <span class="nicon">${n.icon}</span>
        </div>
        <div class="nlabel">${n.label.replace('\n','<br>')}</div>
        ${n.badge?`<span class="nbadge ${n.badgeClass}" style="border-color:${n.color}66;color:${n.color}">${n.badge}</span>`:''}`;
    } else {
      el.className='node node-leaf';
      el.id=`node-${key}`;
      el.style.left=x+'px'; el.style.top=y+'px';
      el.innerHTML=`
        <div class="nglow" style="width:75px;height:75px;top:-13px;left:-13px;background:radial-gradient(circle,${n.glow},transparent 65%)"></div>
        <div class="nring" style="background:${n.color}15;border-color:${n.color}44;box-shadow:0 0 10px ${n.glow.replace('0.3','0.08')}">
          <span class="nicon">${n.icon}</span>
        </div>
        <div class="nlabel">${n.label}</div>`;
    }

    // Click handler
    const targetKey = n.parent || key;
    el.addEventListener('click',(e)=>{ e.stopPropagation(); openPanel(targetKey, key); });
    wrap.appendChild(el);
  }
}

// ── Panel ────────────────────────────────────────────────────────────────
let activeKey = null;

function openPanel(key, clickedKey){
  const c = CONTENT[key];
  if(!c) return;

  // Highlight active nodes
  document.querySelectorAll('.node').forEach(n=>n.classList.remove('active'));
  document.getElementById(`node-${clickedKey}`)?.classList.add('active');
  document.getElementById(`node-${key}`)?.classList.add('active');

  // Zoom canvas toward clicked node
  const n = NODES[clickedKey] || NODES[key];
  const W = vw(), H = vh();
  const nx = px(n.x, W), ny = px(n.y, H);
  const scale = n.type==='root' ? 1.2 : 1.5;
  zc.style.transformOrigin = `${nx}px ${ny}px`;
  zc.style.transform = `scale(${scale})`;

  // Fill panel
  document.getElementById('pIcon').textContent = c.icon;
  document.getElementById('pName').textContent = c.name;
  document.getElementById('pSub').textContent  = c.sub;
  document.getElementById('pSub').style.color  = c.subColor||'#7c88a8';
  document.getElementById('pBody').innerHTML   = c.html;

  document.getElementById('hint').classList.add('hide');
  document.body.classList.add('panel-open');
  activeKey = key;
}

function closePanel(){
  document.body.classList.remove('panel-open');
  zc.style.transform = 'scale(1)';
  zc.style.transformOrigin = '50% 50%';
  document.querySelectorAll('.node').forEach(n=>n.classList.remove('active'));
  document.getElementById('hint').classList.remove('hide');
  activeKey = null;
}

document.getElementById('backBtn').addEventListener('click', closePanel);
tree.addEventListener('click', ()=>{ if(activeKey) closePanel(); });

// Prevent panel click from closing
document.getElementById('panel').addEventListener('click', e=>e.stopPropagation());

window.addEventListener('resize', ()=>{ if(!activeKey) renderTree(); else { renderTree(); } });
renderTree();

// ── ESC key ──────────────────────────────────────────────────────────────
document.addEventListener('keydown', e=>{ if(e.key==='Escape') closePanel(); });
</script>
