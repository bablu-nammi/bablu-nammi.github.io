<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bharani Nammi — Deep Learning Researcher</title>
  <meta name="description" content="Bharani Nammi — Deep Learning Engineer & Researcher. Interactive portfolio."/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html,body{width:100%;height:100%;overflow:hidden;background:#03050e;font-family:'Inter',system-ui,sans-serif;}

    /* ── Three.js container ─────────────────────────────── */
    #three-container { position:fixed; inset:0; z-index:10; transition:opacity 0.3s; }
    .label3d {
      font-family:'Inter',sans-serif; font-size:10px; font-weight:700;
      color:#c4cde8; text-align:center; line-height:1.35; white-space:nowrap;
      text-transform:uppercase; letter-spacing:0.6px;
      opacity:0; transform:translateY(4px);
      transition:opacity 0.22s, transform 0.22s;
      pointer-events:none;
      text-shadow:0 1px 6px rgba(3,5,14,0.9);
      padding:2px 6px; border-radius:4px;
      background:rgba(3,5,14,0.35);
    }
    .label3d.visible { opacity:1; transform:translateY(0); }
.label3d.label-light { color:#1e2a5e; background:rgba(221,228,245,0.88); text-shadow:none; }

    /* Keep dark for space even in light mode */
    body { background:#03050e; }
    body.light { background:#03050e; }

    /* ── Click-catcher (invisible, no darken) ───────────── */
    #zoom-backdrop{
      position:fixed;inset:0;z-index:40;
      opacity:0;pointer-events:none;
      transition:opacity 0.3s;
    }
    body.zoomed-in #zoom-backdrop{opacity:1;pointer-events:auto;}

    /* ── Right-side drawer ──────────────────────────────── */
    #content-card{
      position:fixed;
      right:0;top:0;bottom:0;
      width:580px;max-width:96vw;
      transform:translateX(102%);
      opacity:0;pointer-events:none;
      background:rgba(4,6,18,0.98);
      border-left:1px solid rgba(255,255,255,0.07);
      border-radius:18px 0 0 18px;
      z-index:300;
      transition:transform 0.38s cubic-bezier(0.32,0.72,0,1), opacity 0.28s;
      display:flex;flex-direction:column;
      overflow:hidden;
      box-shadow:-32px 0 100px rgba(0,0,0,0.6), 0 0 0 1px rgba(99,102,241,0.1);
    }
    body.zoomed-in #content-card{
      opacity:1;pointer-events:auto;
      transform:translateX(0);
    }

    .card-topbar{
      display:flex;align-items:center;gap:16px;
      padding:16px 28px;
      border-bottom:1px solid rgba(255,255,255,0.05);
      flex-shrink:0;
      background:rgba(255,255,255,0.015);
    }
    .back-btn{
      background:rgba(99,102,241,0.1);border:1px solid rgba(99,102,241,0.22);
      color:#818cf8;padding:6px 14px;border-radius:8px;cursor:pointer;
      font-family:inherit;font-size:12px;font-weight:700;
      display:flex;align-items:center;gap:6px;transition:all 0.2s;
      flex-shrink:0;
    }
    .back-btn:hover{background:rgba(99,102,241,0.2);color:#c7d2fe;}
    .card-title-wrap{flex:1;}
    .card-title{font-size:20px;font-weight:800;color:#eef2ff;letter-spacing:-0.5px;}
    .card-sub{font-size:12.5px;font-weight:500;margin-top:2px;}

    .card-body{
      flex:1;overflow-y:auto;padding:32px 36px;
      scrollbar-width:thin;scrollbar-color:#1a2236 transparent;
    }
    .card-body::-webkit-scrollbar{width:5px;}
    .card-body::-webkit-scrollbar-thumb{background:#1a2236;border-radius:3px;}

    /* Two-column grid for papers and awards on wide card */
    .two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
    @media(max-width:800px){.two-col{grid-template-columns:1fr;}}

    /* ── About ──────────────────────────────────────────── */
    .about-layout{display:grid;grid-template-columns:1fr 1fr;gap:40px;align-items:start;}
    @media(max-width:700px){.about-layout{grid-template-columns:1fr;}}
    .about-left{}
    .about-hero{display:flex;gap:22px;align-items:flex-start;margin-bottom:24px;}
    .about-avatar{width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,#6366f1,#4f46e5);display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:900;color:white;flex-shrink:0;}
    .about-name{font-size:26px;font-weight:900;letter-spacing:-1px;color:#eef2ff;margin-bottom:5px;}
    .about-role{font-size:13.5px;color:#818cf8;font-weight:600;margin-bottom:10px;}
    .about-locs{display:flex;gap:7px;flex-wrap:wrap;}
    .loc-chip{background:#0c1020;border:1px solid #161e30;color:#7c88a8;font-size:11px;font-weight:600;padding:3px 10px;border-radius:6px;}
    .about-bio{font-size:14px;color:#7c88a8;line-height:1.85;margin-bottom:0;}
    .about-right{}
    .about-stats{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:22px;}
    .ast{background:#0c1020;border:1px solid #161e30;border-radius:12px;padding:18px;text-align:center;}
    .ast-v{font-family:'JetBrains Mono',monospace;font-size:24px;font-weight:700;color:#eef2ff;}
    .ast-l{font-size:10px;color:#3d4a6a;text-transform:uppercase;letter-spacing:0.8px;margin-top:4px;}
    .about-links{display:flex;gap:9px;flex-wrap:wrap;}
    .alink{display:flex;align-items:center;gap:7px;background:#0c1020;border:1px solid #1e2840;color:#7c88a8;text-decoration:none;padding:10px 16px;border-radius:9px;font-size:13px;font-weight:600;transition:all 0.2s;}
    .alink:hover{border-color:#6366f1;color:#eef2ff;}

    /* ── Papers ─────────────────────────────────────────── */
    .papers-grid{display:flex;flex-direction:column;gap:13px;}
    .paper-card{background:#0c1020;border:1px solid #161e30;border-radius:12px;padding:18px;transition:border-color 0.2s;}
    .paper-card:hover{border-color:#243048;}
    .paper-title{font-size:13.5px;font-weight:700;color:#eef2ff;line-height:1.4;margin-bottom:5px;}
    .paper-authors{font-size:11.5px;color:#818cf8;margin-bottom:3px;font-weight:500;}
    .paper-venue{font-size:11px;color:#3d4a6a;font-style:italic;margin-bottom:9px;}
    .paper-abstract{font-size:11.5px;color:#7c88a8;line-height:1.65;margin-bottom:10px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;}
    .paper-footer{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:7px;}
    .paper-tags{display:flex;gap:5px;flex-wrap:wrap;}
    .ptag{background:rgba(6,182,212,0.07);border:1px solid rgba(6,182,212,0.2);color:#06b6d4;font-size:10px;font-weight:600;padding:2px 7px;border-radius:4px;}
    .paper-year{font-family:'JetBrains Mono',monospace;font-size:10.5px;color:#3d4a6a;background:#070a16;border:1px solid #161e30;padding:2px 7px;border-radius:5px;}
    .paper-link{font-size:12px;color:#818cf8;text-decoration:none;font-weight:600;display:flex;align-items:center;gap:4px;}
    .paper-link:hover{color:#c7d2fe;}
    .papers-drop{background:#070a16;border:2px dashed rgba(99,102,241,0.2);border-radius:12px;padding:36px 22px;text-align:center;}
    .papers-drop strong{display:block;font-size:14px;color:#94a3b8;margin-bottom:6px;}
    .papers-drop span{font-size:12px;color:#3d4a6a;line-height:1.7;display:block;}

    /* ── Awards ─────────────────────────────────────────── */
    .awards-grid{display:flex;flex-direction:column;gap:13px;}
    .award-card{background:#0c1020;border:1px solid #161e30;border-radius:12px;padding:18px;position:relative;overflow:hidden;transition:all 0.2s;}
    .award-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--ac,linear-gradient(90deg,#f59e0b,#fbbf24));}
    .award-card.win{border-color:rgba(245,158,11,0.25);background:rgba(245,158,11,0.025);}
    .award-card:hover{transform:translateY(-2px);}
    .award-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:9px;}
    .award-title-wrap{}
    .award-event{font-size:14px;font-weight:700;color:#eef2ff;margin-bottom:3px;}
    .award-project{font-size:12px;color:#f59e0b;font-weight:600;margin-bottom:6px;}
    .award-badge{font-size:9.5px;font-weight:700;padding:3px 10px;border-radius:20px;border:1px solid;text-transform:uppercase;letter-spacing:0.4px;flex-shrink:0;margin-top:2px;}
    .badge-gold{border-color:rgba(245,158,11,0.45);color:#f59e0b;background:rgba(245,158,11,0.1);}
    .badge-part{border-color:#1e2840;color:#3d4a6a;background:transparent;}
    .badge-papers{border-color:rgba(6,182,212,0.45);color:#06b6d4;background:rgba(6,182,212,0.1);}
    .award-desc{font-size:12px;color:#7c88a8;line-height:1.6;}
    .award-year{font-family:'JetBrains Mono',monospace;font-size:10.5px;color:#3d4a6a;margin-top:8px;}

    /* ── Experience ──────────────────────────────────────── */
    .exp-timeline{display:flex;flex-direction:column;gap:13px;}
    .exp-card{background:#0c1020;border:1px solid #161e30;border-radius:12px;padding:18px;transition:border-color 0.2s;}
    .exp-card:hover{border-color:#243048;}
    .exp-top{display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:5px;}
    .exp-role{font-size:14px;font-weight:700;color:#eef2ff;}
    .exp-co{font-size:12px;color:#818cf8;font-weight:600;margin-top:2px;}
    .exp-period{font-family:'JetBrains Mono',monospace;font-size:10.5px;color:#3d4a6a;background:#070a16;border:1px solid #161e30;padding:3px 9px;border-radius:5px;align-self:flex-start;white-space:nowrap;}
    .exp-desc{font-size:12px;color:#7c88a8;line-height:1.7;margin-top:8px;}
    .exp-stack{display:flex;flex-wrap:wrap;gap:5px;margin-top:10px;}
    .etag{background:rgba(99,102,241,0.07);border:1px solid rgba(99,102,241,0.16);color:#818cf8;font-size:10px;font-weight:600;padding:2px 8px;border-radius:4px;}

    /* ── Education ───────────────────────────────────────── */
    .edu-list{display:flex;flex-direction:column;gap:13px;}
    .edu-card{background:#0c1020;border:1px solid #161e30;border-radius:12px;padding:20px;position:relative;overflow:hidden;}
    .edu-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,#6366f1,#06b6d4);}
    .edu-school{font-size:15px;font-weight:800;color:#eef2ff;margin-bottom:4px;}
    .edu-deg{font-size:13px;color:#818cf8;font-weight:600;margin-bottom:3px;}
    .edu-year{font-family:'JetBrains Mono',monospace;font-size:11px;color:#3d4a6a;margin-bottom:12px;}
    .edu-tags{display:flex;flex-wrap:wrap;gap:6px;}
    .eutag{background:#070a16;border:1px solid #161e30;color:#7c88a8;font-size:11px;padding:3px 9px;border-radius:5px;}

    /* ── Hint ────────────────────────────────────────────── */
    #hint{
      position:fixed;bottom:22px;left:50%;transform:translateX(-50%);
      background:rgba(12,16,32,0.88);border:1px solid rgba(255,255,255,0.05);
      color:#3d4a6a;font-size:12px;font-weight:500;
      padding:7px 18px;border-radius:20px;
      pointer-events:none;z-index:100;
      transition:opacity 0.4s;backdrop-filter:blur(8px);
    }
    #hint.hide{opacity:0;}

    /* ── Sig ─────────────────────────────────────────────── */
    #sig{
      position:fixed;top:18px;left:24px;z-index:200;
      font-size:14px;font-weight:900;color:#eef2ff;letter-spacing:-0.5px;
      pointer-events:none;
    }
    #sig em{color:#818cf8;font-style:normal;}

    /* ── Legend ──────────────────────────────────────────── */
    #legend{
      position:fixed;left:24px;top:50%;transform:translateY(-50%);
      z-index:200;display:flex;flex-direction:column;gap:10px;
      pointer-events:none;
    }
    .leg-section{font-size:9.5px;font-weight:800;color:#9ca3af;
      text-transform:uppercase;letter-spacing:1.2px;margin-bottom:2px;}
    .leg-item{
      display:flex;align-items:center;gap:9px;
      font-size:12px;font-weight:600;color:#6b7280;
      transition:color 0.2s;
      pointer-events:auto;cursor:pointer;
    }
    .leg-item:hover{color:#c4cde8;}
    .leg-dot{
      width:9px;height:9px;border-radius:50%;flex-shrink:0;
      box-shadow:0 0 6px var(--ldc,transparent);
    }
    .leg-back{
      display:flex;align-items:center;gap:7px;
      font-size:11.5px;font-weight:700;color:#6366f1;
      background:rgba(99,102,241,0.08);border:1px solid rgba(99,102,241,0.18);
      padding:7px 13px;border-radius:10px;cursor:pointer;
      pointer-events:auto;transition:all 0.2s;margin-bottom:6px;
    }
    .leg-back:hover{background:rgba(99,102,241,0.16);color:#4338ca;}
    /* ── Legend detail mode (planet view) ────────── */
    #legend.leg-detail{max-width:250px;}
    .leg-summary{
      font-size:11px;color:#7c88a8;line-height:1.6;
      margin-top:4px;margin-bottom:2px;
      border-left:2px solid rgba(255,255,255,0.1);
      padding-left:8px;
    }
    .leg-item-d{align-items:flex-start;gap:10px;flex-direction:row;padding:6px 0;cursor:pointer;}
    .leg-item-text{display:flex;flex-direction:column;gap:3px;}
    .leg-name{font-size:12px;font-weight:700;color:#c4cde8;line-height:1.2;}
    .leg-desc{font-size:10.5px;font-weight:400;color:#6b7280;line-height:1.4;}

    /* ── PDF embed view ─────────────────────────────────── */
    .pdf-embed-wrap{display:flex;flex-direction:column;height:100%;gap:0;}
    .pdf-embed-header{
      flex-shrink:0;padding-bottom:14px;margin-bottom:14px;
      border-bottom:1px solid rgba(255,255,255,0.05);
    }
    .pdf-embed-frame{
      flex:1;min-height:0;width:100%;
      border:none;border-radius:10px;
      background:#0a0d1c;
    }
    .card-body.pdf-embed{
      padding:20px 24px;overflow:hidden;
      display:flex;flex-direction:column;
    }

    /* ── Paper detail view ───────────────────────────────── */
    .paper-detail{display:flex;flex-direction:column;gap:22px;}
    .paper-detail-left{}
    .paper-detail-right{display:flex;flex-direction:column;gap:14px;}

    .pd-venue-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:18px;}
    .pd-venue{font-size:12px;font-weight:700;color:#06b6d4;text-transform:uppercase;letter-spacing:0.6px;}
    .pd-dot{color:#1e2840;}
    .pd-year{font-family:'JetBrains Mono',monospace;font-size:11.5px;color:#3d4a6a;}

    .pd-title{font-size:18px;font-weight:800;color:#eef2ff;line-height:1.45;margin-bottom:14px;letter-spacing:-0.3px;}
    .pd-authors{font-size:12.5px;color:#818cf8;font-weight:500;line-height:1.7;margin-bottom:20px;}

    .pd-section-label{font-size:10px;font-weight:700;color:#3d4a6a;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;}
    .pd-abstract{font-size:13.5px;color:#94a3b8;line-height:1.85;margin-bottom:24px;}

    .pd-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:24px;}

    .pd-read-btn{
      display:inline-flex;align-items:center;gap:9px;
      background:linear-gradient(135deg,rgba(6,182,212,0.15),rgba(6,182,212,0.06));
      border:1px solid rgba(6,182,212,0.35);
      color:#06b6d4;text-decoration:none;
      padding:13px 20px;border-radius:11px;
      font-family:inherit;font-size:13px;font-weight:700;
      transition:all 0.2s;width:100%;justify-content:center;
    }
    .pd-read-btn:hover{background:rgba(6,182,212,0.22);border-color:rgba(6,182,212,0.55);color:#67e8f9;}

    .pd-stat-box{background:#070a16;border:1px solid #161e30;border-radius:12px;padding:18px;}
    .pd-stat-label{font-size:10px;font-weight:700;color:#3d4a6a;text-transform:uppercase;letter-spacing:0.8px;margin-bottom:12px;}
    .pd-stat-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #0d1220;}
    .pd-stat-row:last-child{border-bottom:none;}
    .pd-stat-key{font-size:11.5px;color:#7c88a8;}
    .pd-stat-val{font-family:'JetBrains Mono',monospace;font-size:11.5px;color:#eef2ff;font-weight:600;}

    .pd-highlight{background:rgba(99,102,241,0.07);border:1px solid rgba(99,102,241,0.18);border-radius:10px;padding:14px;}
    .pd-highlight-label{font-size:10px;font-weight:700;color:#818cf8;text-transform:uppercase;letter-spacing:0.8px;margin-bottom:8px;}
    .pd-highlight-text{font-size:12.5px;color:#94a3b8;line-height:1.7;}

    /* ── Paper tabs ───────────────────────────────────────── */
    .ptabs{display:flex;gap:4px;margin-bottom:16px;flex-shrink:0;
      background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);
      border-radius:10px;padding:4px;}
    .ptab{flex:1;padding:8px 0;font-family:inherit;font-size:12px;font-weight:700;
      border:none;border-radius:7px;cursor:pointer;transition:all 0.2s;
      background:transparent;color:#6b7280;}
    .ptab.active{background:rgba(6,182,212,0.15);color:#06b6d4;
      box-shadow:0 1px 6px rgba(6,182,212,0.15);}
    .ptab:hover:not(.active){background:rgba(255,255,255,0.04);color:#94a3b8;}
    .ptab-panel{display:none;flex:1;min-height:0;}
    .ptab-panel.active{display:flex;flex-direction:column;}
    .ptab-overview{overflow-y:auto;flex-direction:column;gap:18px;
      scrollbar-width:thin;scrollbar-color:#1a2236 transparent;}

    /* ── Theme toggle button ─────────────────────────────── */
    #theme-toggle{
      position:fixed;top:16px;right:20px;z-index:200;
      background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);
      color:#94a3b8;cursor:pointer;font-size:16px;
      width:36px;height:36px;border-radius:10px;
      display:flex;align-items:center;justify-content:center;
      transition:all 0.2s;backdrop-filter:blur(8px);
    }
    #theme-toggle:hover{background:rgba(255,255,255,0.12);color:#eef2ff;}

    /* Light card (UI chrome only — canvas stays dark) */
    body.light #content-card{
      background:rgba(250,251,255,0.99);
      border-color:rgba(0,0,0,0.09);
      box-shadow:-24px 0 80px rgba(0,0,0,0.13), 0 0 0 1px rgba(99,102,241,0.07);
    }
    body.light .card-topbar{background:rgba(0,0,0,0.02);border-bottom-color:rgba(0,0,0,0.06);}
    body.light .back-btn{background:rgba(99,102,241,0.08);border-color:rgba(99,102,241,0.2);color:#6366f1;}
    body.light .back-btn:hover{background:rgba(99,102,241,0.15);color:#4338ca;}
    body.light .card-title{color:#1e2030;}
    body.light .card-body{scrollbar-color:#d1d5db transparent;}
    body.light .about-name{color:#1e2030;}
    body.light .about-bio{color:#4b5563;}
    body.light .about-role{color:#6366f1;}
    body.light .loc-chip{background:#f3f4f6;border-color:#e5e7eb;color:#4b5563;}
    body.light .ast{background:#f9fafb;border-color:#e5e7eb;}
    body.light .ast-v{color:#1e2030;}
    body.light .ast-l{color:#6b7280;}
    body.light .alink{background:#f9fafb;border-color:#e5e7eb;color:#4b5563;}
    body.light .alink:hover{border-color:#6366f1;color:#1e2030;}
    body.light .paper-card{background:#f9fafb;border-color:#e5e7eb;}
    body.light .paper-card:hover{border-color:#c7d2fe;}
    body.light .paper-title{color:#1e2030;}
    body.light .paper-authors{color:#6366f1;}
    body.light .paper-venue{color:#9ca3af;}
    body.light .paper-abstract{color:#4b5563;}
    body.light .ptag{background:rgba(6,182,212,0.08);border-color:rgba(6,182,212,0.25);color:#0891b2;}
    body.light .award-card{background:#f9fafb;border-color:#e5e7eb;}
    body.light .award-event{color:#1e2030;}
    body.light .award-desc{color:#4b5563;}
    body.light .exp-card,.body.light .edu-card{background:#f9fafb;border-color:#e5e7eb;}
    body.light .exp-role,.body.light .edu-school{color:#1e2030;}
    body.light .exp-desc{color:#4b5563;}
    body.light .pd-title{color:#1e2030;}
    body.light .pd-abstract{color:#4b5563;}
    body.light .pd-stat-box{background:#f9fafb;border-color:#e5e7eb;}
    body.light .pd-stat-key{color:#6b7280;}
    body.light .pd-stat-val{color:#1e2030;}
    body.light .pd-highlight{background:rgba(99,102,241,0.06);border-color:rgba(99,102,241,0.15);}
    body.light .pd-highlight-text{color:#374151;}
    body.light .papers-drop{background:#f3f4f6;border-color:rgba(99,102,241,0.25);}
    body.light .pdf-embed-header{border-bottom-color:rgba(0,0,0,0.06);}

// ── Moon definitions (kept for reference) ─────────────────────────────────
const MOONS = {
  papers:[ {key:'p1',ang:0,dur:10}, {key:'p2',ang:120,dur:13}, {key:'p3',ang:240,dur:9} ],
  awards:[ {key:'a1',ang:80,dur:8}, {key:'a2',ang:260,dur:11} ],
};

// ── Three.js orbital params ───────────────────────────────────────────────
const PLANET_ORBITS = {
  edu:    { r:4.5,  tilt: 3,  speed:0.28, startAng:2.48 },
  papers: { r:7.0,  tilt:-5,  speed:0.20, startAng:3.76 },
  awards: { r:9.5,  tilt: 4,  speed:0.14, startAng:5.67 },
  exp:    { r:12.0, tilt:-3,  speed:0.10, startAng:0.73 },
};

const MOON_ORBITS = {
  papers: [
    { key:'p1', r:1.8, speed:0.9,  startAng:0    },
    { key:'p2', r:2.8, speed:0.58, startAng:2.09 },
    { key:'p3', r:3.8, speed:0.40, startAng:4.19 },
  ],
  awards: [
    { key:'a1', r:1.8, speed:0.8,  startAng:1.4  },
    { key:'a2', r:2.8, speed:0.50, startAng:4.5  },
  ],
};

// ── Per-planet visual config ──────────────────────────────────────────────
const PLANET_SIZES  = { edu:0.48, papers:0.65, awards:0.57, exp:0.52 };
const PLANET_SHINE  = { edu:80,   papers:60,   awards:45,   exp:90   };
const PLANET_SPIN   = { edu:0.38, papers:0.22, awards:0.30, exp:0.16 }; // rad/s self-spin
const SUN_SPIN      = 0.06;

// ── Scene setup ───────────────────────────────────────────────────────────
const W = window.innerWidth, H = window.innerHeight;
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(55, W/H, 0.1, 500);
camera.position.set(0, 12, 26);

const renderer = new THREE.WebGLRenderer({ antialias:true, alpha:false });
renderer.setSize(W, H);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setClearColor(0x03050e, 1);
document.getElementById('three-container').appendChild(renderer.domElement);

const labelRenderer = new CSS2DRenderer();
labelRenderer.setSize(W, H);
labelRenderer.domElement.style.cssText = 'position:absolute;top:0;left:0;pointer-events:none;z-index:11;';
document.getElementById('three-container').appendChild(labelRenderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true; controls.dampingFactor = 0.08;
controls.minDistance = 4; controls.maxDistance = 45;
controls.target.set(0,0,0);

// ── Lights + stars ────────────────────────────────────────────────────────
const ambientLight = new THREE.AmbientLight(0x334466, 2.5);
scene.add(ambientLight);
const sunLight = new THREE.PointLight(0xffffff, 5, 70);
scene.add(sunLight);

const starPos = new Float32Array(9000*3);
for(let i=0;i<starPos.length;i++) starPos[i]=(Math.random()-0.5)*300;
const starGeo = new THREE.BufferGeometry();
starGeo.setAttribute('position', new THREE.BufferAttribute(starPos,3));
const starMat = new THREE.PointsMaterial({color:0xffffff,size:0.18,transparent:true,opacity:0.55});
const stars = new THREE.Points(starGeo, starMat);
scene.add(stars);

// ── Helper functions ──────────────────────────────────────────────────────
function hexNum(hex){ return parseInt(hex.replace('#',''),16); }

function makeSphere(radius, hexColor, emissiveInt=0, shininess=40){
  return new THREE.Mesh(
    new THREE.SphereGeometry(radius,48,48),
    new THREE.MeshPhongMaterial({
      color:hexNum(hexColor), emissive:hexNum(hexColor),
      emissiveIntensity:emissiveInt, shininess
    })
  );
}

function makePlanetRing(innerR, outerR, hexColor, tiltDeg=28){
  const geo = new THREE.RingGeometry(innerR, outerR, 64);
  const mat = new THREE.MeshBasicMaterial({
    color:hexNum(hexColor), side:THREE.DoubleSide,
    transparent:true, opacity:0.55
  });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.rotation.x = (tiltDeg * Math.PI)/180;
  return mesh;
}

function makeGlowShell(radius, hexColor, opacity=0.12){
  return new THREE.Mesh(
    new THREE.SphereGeometry(radius,16,16),
    new THREE.MeshBasicMaterial({color:hexNum(hexColor),transparent:true,opacity,side:THREE.BackSide})
  );
}

function makeOrbitRing(radius, tiltDeg, hexColor){
  const pts=[];
  for(let i=0;i<=128;i++){
    const a=(i/128)*Math.PI*2;
    pts.push(new THREE.Vector3(Math.cos(a)*radius,0,Math.sin(a)*radius));
  }
  const line=new THREE.LineLoop(
    new THREE.BufferGeometry().setFromPoints(pts),
    new THREE.LineBasicMaterial({color:hexNum(hexColor),transparent:true,opacity:0.22})
  );
  line.rotation.x=(tiltDeg*Math.PI)/180;
  return line;
}

function makeLabel(text, yOffset=0){
  const div=document.createElement('div');
  div.className='label3d';
  div.innerHTML=text.replace('\n','<br>');
  const obj=new CSS2DObject(div);
  obj.position.set(0,yOffset,0);
  return obj;
}

// ── World group ───────────────────────────────────────────────────────────
const worldGroup = new THREE.Group();
scene.add(worldGroup);

const pivots = {};
const bodyMeshes = {};
const labelObjs = {};

function clearWorld(){
  while(worldGroup.children.length) worldGroup.remove(worldGroup.children[0]);
  Object.keys(pivots).forEach(k=>delete pivots[k]);
  Object.keys(bodyMeshes).forEach(k=>delete bodyMeshes[k]);
  Object.keys(labelObjs).forEach(k=>delete labelObjs[k]);
}

// ── Build root scene ──────────────────────────────────────────────────────
function buildRootScene(){
  clearWorld();

  const sun = makeSphere(1.35,'#6366f1',0.55);
  sun.userData={key:'root',type:'sun'};
  sun.add(makeGlowShell(1.9,'#6366f1',0.18));
  sun.add(makeGlowShell(2.8,'#6366f1',0.06));
  const sunLbl=makeLabel('Bharani\nNammi',2.1);
  sun.add(sunLbl); labelObjs['root']=sunLbl;
  sunLbl.element.classList.add('visible');
  worldGroup.add(sun); bodyMeshes['root']=sun;

  Object.entries(PLANET_ORBITS).forEach(([key,orb])=>{
    const nd=NODES[key];
    worldGroup.add(makeOrbitRing(orb.r, orb.tilt, nd.color));

    const pivot=new THREE.Object3D();
    pivot.rotation.x=(orb.tilt*Math.PI)/180;
    pivot.rotation.y=orb.startAng;
    pivot.userData.orbitSpeed=orb.speed;
    worldGroup.add(pivot); pivots[key]=pivot;

    const sz=PLANET_SIZES[key]||0.55;
    const planet=makeSphere(sz, nd.color, 0.28, PLANET_SHINE[key]||40);
    planet.position.set(orb.r,0,0);
    planet.userData={key,type:'planet'};
    planet.add(makeGlowShell(sz*1.55, nd.color, 0.2));
    // Saturn-style ring on Experience planet
    if(key==='exp') planet.add(makePlanetRing(sz*1.35, sz*2.1, nd.color, 30));
    pivot.add(planet); bodyMeshes[key]=planet;

    const lbl=makeLabel(nd.label, sz+0.55);
    planet.add(lbl); labelObjs[key]=lbl;
  });
}

// ── Build planet scene ────────────────────────────────────────────────────
function buildPlanetScene(planetKey){
  clearWorld();
  const nd=NODES[planetKey];
  const moonList=MOON_ORBITS[planetKey]||[];

  const planet=makeSphere(0.95,nd.color,0.38);
  planet.userData={key:planetKey,type:'planet-center'};
  planet.add(makeGlowShell(1.4,nd.color,0.22));
  planet.add(makeGlowShell(2.1,nd.color,0.08));
  const pLbl=makeLabel(nd.label,1.5);
  planet.add(pLbl); labelObjs[planetKey]=pLbl;
  pLbl.element.classList.add('visible');
  worldGroup.add(planet); bodyMeshes[planetKey]=planet;

  moonList.forEach(m=>{
    const mn=NODES[m.key];
    worldGroup.add(makeOrbitRing(m.r,0,mn.color));

    const pivot=new THREE.Object3D();
    pivot.rotation.y=m.startAng;
    pivot.userData.orbitSpeed=m.speed;
    worldGroup.add(pivot); pivots[m.key]=pivot;

    const moon=makeSphere(0.3,mn.color,0.32);
    moon.position.set(m.r,0,0);
    moon.userData={key:m.key,type:'moon'};
    moon.add(makeGlowShell(0.52,mn.color,0.28));
    pivot.add(moon); bodyMeshes[m.key]=moon;

    const lbl=makeLabel(mn.label,0.65);
    moon.add(lbl); labelObjs[m.key]=lbl;
  });
}

// ── View switching ────────────────────────────────────────────────────────
let viewState='root';
const container=document.getElementById('three-container');

function switchView(key){
  container.style.opacity='0';
  setTimeout(()=>{
    viewState=key;
    if(key==='root'){
      buildRootScene();
      camera.position.set(0,12,26);
      controls.target.set(0,0,0);
    } else {
      buildPlanetScene(key);
      camera.position.set(0,6,12);
      controls.target.set(0,0,0);
    }
    controls.update();
    updateLegend();
    requestAnimationFrame(()=>{ container.style.opacity='1'; });
  },300);
}
window.switchView=switchView;

// ── Hover + click ─────────────────────────────────────────────────────────
const raycaster=new THREE.Raycaster();
const mouse2=new THREE.Vector2();
let hoveredKey=null;

function getClickables(){ return Object.values(bodyMeshes); }

renderer.domElement.addEventListener('mousemove',e=>{
  const r=renderer.domElement.getBoundingClientRect();
  mouse2.x=((e.clientX-r.left)/r.width)*2-1;
  mouse2.y=-((e.clientY-r.top)/r.height)*2+1;
  raycaster.setFromCamera(mouse2,camera);
  const hits=raycaster.intersectObjects(getClickables(),true);
  let newKey=null;
  if(hits.length){
    let obj=hits[0].object;
    while(obj && !obj.userData.key) obj=obj.parent;
    if(obj) newKey=obj.userData.key;
  }
  if(newKey!==hoveredKey){
    if(hoveredKey && labelObjs[hoveredKey] && !labelObjs[hoveredKey].element.classList.contains('always-visible')){
      labelObjs[hoveredKey].element.classList.remove('visible');
    }
    hoveredKey=newKey;
    if(hoveredKey && labelObjs[hoveredKey]){
      labelObjs[hoveredKey].element.classList.add('visible');
    }
    renderer.domElement.style.cursor=hoveredKey?'pointer':'grab';
  }
});

let mdPos={x:0,y:0};
renderer.domElement.addEventListener('mousedown',e=>{mdPos={x:e.clientX,y:e.clientY};});
renderer.domElement.addEventListener('click',e=>{
  if(Math.hypot(e.clientX-mdPos.x,e.clientY-mdPos.y)>5) return;
  const r=renderer.domElement.getBoundingClientRect();
  mouse2.x=((e.clientX-r.left)/r.width)*2-1;
  mouse2.y=-((e.clientY-r.top)/r.height)*2+1;
  raycaster.setFromCamera(mouse2,camera);
  const hits=raycaster.intersectObjects(getClickables(),true);
  if(!hits.length) return;
  let obj=hits[0].object;
  while(obj && !obj.userData.key) obj=obj.parent;
  if(!obj) return;
  const {key,type}=obj.userData;
  if(type==='sun') openCard('root','root');
  else if(type==='planet'&&MOON_ORBITS[key]) switchView(key);
  else if(type==='planet') openCard(key,key);
  else if(type==='moon') openCard(key,key);
  else if(type==='planet-center') openCard(key,key);
});

// ── Animate loop ──────────────────────────────────────────────────────────
const clock=new THREE.Clock();
function animate(){
  requestAnimationFrame(animate);
  const d=clock.getDelta();
  // orbital revolution
  Object.values(pivots).forEach(p=>{ p.rotation.y+=p.userData.orbitSpeed*d; });
  // self-spin on each planet/moon body
  Object.entries(bodyMeshes).forEach(([key,mesh])=>{
    const spin = PLANET_SPIN[key];
    if(spin) mesh.rotation.y += spin * d;
    if(key==='root') mesh.rotation.y += SUN_SPIN * d;
  });
  controls.update();
  renderer.render(scene,camera);
  labelRenderer.render(scene,camera);
}

// ── Legend ────────────────────────────────────────────────────────────────
function updateLegend(){
  const leg = document.getElementById('legend');
  if(viewState === 'root'){
    leg.className='';
    const cats = Object.entries(NODES).filter(([,n])=>n.type==='cat');
    leg.innerHTML = '<div class="leg-section">Explore</div>'
      + cats.map(([k,n])=>
        `<div class="leg-item" onclick="switchView('${k}')"><span class="leg-dot" style="background:${n.color}"></span>${n.label.replace('\n',' ')}</div>`
      ).join('');
  } else {
    leg.className='leg-detail';
    const pN = NODES[viewState];
    const ms = MOON_ORBITS[viewState]||[];
    const summaryHtml = pN.summary
      ? `<div class="leg-summary">${pN.summary}</div>` : '';
    leg.innerHTML =
      '<div class="leg-back" onclick="switchView(\'root\')">← Solar System</div>'
      +'<div class="leg-section">'+pN.label.replace('\n',' ')+'</div>'
      + summaryHtml
      +(ms.length ? '<div class="leg-section" style="margin-top:12px">In this orbit</div>' : '')
      + ms.map(m=>{
          const mn=NODES[m.key];
          return `<div class="leg-item leg-item-d" onclick="openCard('${m.key}','${m.key}')">
            <span class="leg-dot" style="background:${mn.color};flex-shrink:0"></span>
            <div class="leg-item-text">
              <div class="leg-name">${mn.label.replace('\n',' ')}</div>
              <div class="leg-desc">${mn.desc||''}</div>
            </div>
          </div>`;
        }).join('');
  }
}

// ── Card open / close ─────────────────────────────────────────────────────
let activeKey = null;

function openCard(key, clickedKey){
  const c = CONTENT[key];
  if(!c) return;
  document.getElementById('cTitle').textContent = c.title;
  document.getElementById('cSub').textContent   = c.sub;
  document.getElementById('cSub').style.color   = c.subColor || '#7c88a8';
  const body = document.getElementById('cBody');
  body.innerHTML = c.html;
  body.className = c.pdfEmbed ? 'card-body pdf-embed' : 'card-body';
  document.getElementById('hint').classList.add('hide');
  document.body.classList.add('zoomed-in');
  activeKey = key;
}
window.openCard=openCard;

function closeCard(){
  document.body.classList.remove('zoomed-in');
  document.getElementById('cBody').className = 'card-body';
  document.getElementById('hint').classList.remove('hide');
  activeKey = null;
}
